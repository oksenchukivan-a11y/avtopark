<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1620">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Автопарк</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:#0f1620; --card:#1a2433; --card2:#222f42; --line:#2b3a50;
    --txt:#e8eef5; --dim:#8aa0b8; --accent:#3aa0ff;
    --green:#2ecc71; --red:#e74c3c; --yellow:#f1c40f;
  }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { display:flex; flex-direction:column; overscroll-behavior:none; }
  .hidden { display:none !important; }

  /* ЛОГІН */
  #login { flex:1; display:flex; flex-direction:column; justify-content:center;
    align-items:center; padding:24px; gap:16px; text-align:center; }
  #login h1 { margin:0; font-size:28px; }
  #login p { color:var(--dim); margin:0; max-width:320px; line-height:1.5; font-size:14px; }
  #login input { width:100%; max-width:340px; padding:14px; border-radius:12px;
    border:1px solid var(--line); background:var(--card); color:var(--txt); font-size:15px; }
  .btn { padding:14px 22px; border-radius:12px; border:none; background:var(--accent);
    color:#fff; font-size:16px; font-weight:600; cursor:pointer; width:100%; max-width:340px; }
  .btn:active { opacity:.8; }
  .btn-sm { width:auto; padding:8px 14px; font-size:14px; background:var(--card2); }

  /* ХЕДЕР */
  header { display:flex; align-items:center; gap:10px; padding:14px 16px;
    padding-top:calc(14px + env(safe-area-inset-top));
    padding-left:calc(16px + env(safe-area-inset-left));
    padding-right:calc(16px + env(safe-area-inset-right));
    background:var(--bg); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:500; }
  header h1 { font-size:18px; margin:0; flex:1; }
  header .icon { width:38px; height:38px; border-radius:10px; background:var(--card2);
    border:none; color:var(--txt); font-size:18px; cursor:pointer; display:flex;
    align-items:center; justify-content:center; }
  #updated { font-size:11px; color:var(--dim); }

  /* МАПА */
  #map { height:38vh; min-height:240px; background:var(--card); }
  .dmap { height:240px; border-radius:12px; overflow:hidden; background:var(--card2); }
  .leaflet-control-layers { background:var(--card) !important; color:var(--txt); border:1px solid var(--line) !important; }
  .leaflet-control-layers-expanded { padding:8px 10px; }
  .reboot { margin-top:14px; width:100%; padding:12px; border-radius:10px; border:1px solid var(--line);
    background:var(--card2); color:var(--txt); font-size:14px; font-weight:600; cursor:pointer; }
  .reboot:active { opacity:.7; }
  .veh-label { background:rgba(15,22,32,.88) !important; color:#fff !important; border:none !important;
    border-radius:6px; padding:1px 7px; font-size:11px; font-weight:700; box-shadow:0 1px 3px rgba(0,0,0,.5); }
  .leaflet-tooltip.veh-label::before { border:0 !important; display:none; }
  .leaflet-popup-content-wrapper { background:var(--card); color:var(--txt); }
  .leaflet-popup-tip { background:var(--card); }

  /* СПИСОК */
  #list { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px;
    padding-bottom:calc(20px + env(safe-area-inset-bottom));
    padding-left:calc(12px + env(safe-area-inset-left));
    padding-right:calc(12px + env(safe-area-inset-right)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px 16px; cursor:pointer; }
  .card:active { background:var(--card2); }
  .card .top { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .card .name { font-size:16px; font-weight:600; flex:1; }
  .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .dot.on { background:var(--green); box-shadow:0 0 8px var(--green); }
  .dot.off { background:var(--dim); }
  .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .cell .v { font-size:18px; font-weight:700; }
  .cell .l { font-size:11px; color:var(--dim); margin-top:2px; }
  .cell .v.fuel { color:var(--accent); }
  .badge { font-size:11px; color:var(--dim); margin-top:8px; }

  /* ДЕТАЛІ */
  #detail { position:fixed; inset:0; background:var(--bg); z-index:1000;
    display:flex; flex-direction:column; transform:translateX(100%); transition:transform .22s; }
  #detail.show { transform:translateX(0); }
  #detail .body { flex:1; overflow-y:auto; padding:16px;
    padding-bottom:calc(24px + env(safe-area-inset-bottom));
    padding-left:calc(16px + env(safe-area-inset-left));
    padding-right:calc(16px + env(safe-area-inset-right));
    display:flex; flex-direction:column; gap:14px; }
  .section { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 16px; }
  .section h3 { margin:0 0 12px; font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; }
  .row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line); }
  .row:last-child { border-bottom:none; }
  .row .k { color:var(--dim); }
  .row .val { font-weight:600; }
  /* плитки зведення (варіант «великі цифри», вибір v63) */
  .tiles { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:2px 0 10px; }
  .tile { background:var(--card2); border-radius:12px; padding:10px 6px 9px; text-align:center; }
  .tile .tv { font-size:20px; font-weight:800; color:var(--txt); line-height:1.15; font-variant-numeric:tabular-nums; }
  .tile .tv small { font-size:11.5px; font-weight:600; color:var(--dim); }
  .tile .tk { font-size:10.5px; color:var(--dim); margin-top:3px; }
  .big { font-size:26px; font-weight:800; }
  /* стрічка дня — вертикальна шкала часу (v64): час · кружечок-іконка · підпис з адресою */
  .tl { padding-top:2px; }
  .tli { display:flex; align-items:flex-start; position:relative; padding-bottom:18px; }
  .tli:last-child { padding-bottom:2px; }
  .tli::before { content:''; position:absolute; left:61px; top:30px; bottom:-2px; width:2px; background:var(--line); }
  .tli:last-child::before { display:none; }
  .tlt { flex:0 0 46px; font-size:12.5px; color:var(--dim); padding-top:7px; font-variant-numeric:tabular-nums; }
  .tlb { flex:0 0 32px; display:flex; justify-content:center; }
  .tlb .ic { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
             font-size:14px; font-weight:800; color:#fff; box-shadow:0 0 0 3px var(--card); }
  .tlx { flex:1; min-width:0; padding:3px 0 0 12px; }
  .tlx .t1 { font-weight:700; font-size:14.5px; }
  .tlx .t2 { font-size:12.5px; color:var(--dim); margin-top:2px; overflow-wrap:anywhere; }
  .ev { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); }
  .ev:last-child { border-bottom:none; }
  .ev .amt { font-weight:700; font-size:16px; }
  .ev .amt.up { color:var(--green); }
  .ev .amt.down { color:var(--red); }
  .ev .when { font-size:12px; color:var(--dim); }
  .muted { color:var(--dim); font-size:13px; text-align:center; padding:8px 0; }
  .tabs { display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none; padding-bottom:2px; min-height:38px; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex:0 0 auto; display:flex; align-items:center; justify-content:center; min-height:34px;
    padding:0 14px; border-radius:10px; background:var(--card2);
    color:var(--dim); font-size:13px; line-height:1.2; font-weight:600; cursor:pointer; white-space:nowrap; }
  .tab.active { background:var(--accent); color:#fff; }
  .spinner { text-align:center; color:var(--dim); padding:20px; }
</style>
</head>
<body>

<!-- ЕКРАН ЛОГІНУ -->
<div id="login">
  <h1>🚚 Автопарк</h1>
  <p>Встав свій <b>flespi-токен</b> один раз — застосунок запам'ятає його і більше не питатиме.</p>
  <input id="tokenInput" type="text" placeholder="flespi token" autocapitalize="off" autocorrect="off" spellcheck="false">
  <button class="btn" onclick="saveToken()">Увійти</button>
  <p style="font-size:12px">Токен зберігається тільки у твоєму телефоні (localStorage), нікуди не передається.</p>
</div>

<!-- ОСНОВНИЙ ЕКРАН -->
<div id="app" class="hidden" style="flex:1; display:flex; flex-direction:column; min-height:0;">
  <header>
    <h1>Автопарк</h1>
    <span id="updated"></span>
    <button class="icon" onclick="refresh()" title="Оновити">⟳</button>
    <button class="icon" onclick="logout()" title="Вийти">⎋</button>
  </header>
  <div id="map"></div>
  <div id="list"><div class="spinner">Завантаження…</div></div>
</div>

<!-- ДЕТАЛІ МАШИНИ -->
<div id="detail">
  <header>
    <button class="icon" onclick="closeDetail()">‹</button>
    <h1 id="dName">—</h1>
  </header>
  <div class="body" id="dBody"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
